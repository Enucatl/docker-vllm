# OpenAI-compatible model endpoints on the GPU workstation.
#
# Serves vLLM model containers (vision, text, embeddings) on fixed ports.
# Any client that speaks the OpenAI API can use these endpoints.
#
# Profiles:
#   default (extraction)  — OCR, embeddings, structured extraction
#   coding                — Qwen 3.5 27B local LLM for code/text
#
# Usage:
#   docker compose --profile extraction up -d     # Start extraction stack
#   docker compose --profile coding up -d         # Start Qwen 3.5 (stop others first!)
#   docker compose up -d                          # Start all (warning: VRAM conflict)
#
# Start:   docker compose up -d
# Stop:    docker compose down
#
# HuggingFace token (required for gated models like Llama):
#   echo -n "hf_..." > secrets/hf_token.txt
#   setfacl -m u:100000:r secrets/hf_token.txt
#
# Endpoints (OpenAI-compatible):
#   http://<this-host>:8100/v1  — OCR vision model       (Nanonets-OCR2-3B)
#   http://<this-host>:8102/v1  — embeddings             (BAAI/bge-m3)
#   http://<this-host>:8103/v1  — structured extraction  (NuExtract-2.0-8B-GPTQ)
#   http://<this-host>:8107/v1  — large language model   (Qwen/Qwen3.5-9B)

services:

  # OCR vision model
  nanonets-ocr:
    image: vllm/vllm-openai:latest
    restart: no
    ipc: host
    profiles: ["disabled"]
    ports:
      - "8100:8000"
    volumes:
      - hf-cache:/root/.cache/huggingface
      - vllm-cache:/root/.cache/vllm
    secrets:
      - hf_token
    entrypoint: ["/bin/sh", "-c", "export HF_TOKEN=$(cat /run/secrets/hf_token) && exec python3 -m vllm.entrypoints.openai.api_server \"$@\"", "--"]
    command:
      - --model=nanonets/Nanonets-OCR2-3B
      - --max-model-len=20000
      - --trust-remote-code
      - --gpu-memory-utilization=0.38
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Structured extraction - 8B GPTQ quantized model
  nuextract:
    image: vllm/vllm-openai:latest
    restart: no
    ipc: host
    profiles: ["disabled"]
    ports:
      - "8103:8000"
    volumes:
      - hf-cache:/root/.cache/huggingface
      - vllm-cache:/root/.cache/vllm
    secrets:
      - hf_token
    entrypoint: ["/bin/sh", "-c", "export HF_TOKEN=$(cat /run/secrets/hf_token) && exec python3 -m vllm.entrypoints.openai.api_server \"$@\"", "--"]
    command:
      - --model=numind/NuExtract-2.0-8B-GPTQ
      - --dtype=float16
      - --max-model-len=8192
      - --gpu-memory-utilization=0.45
      - --quantization=gptq_marlin
      - --trust-remote-code
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Embeddings — BAAI/bge-m3 on port 8102, multilingual.
  # Served via vLLM.
  bge:
    image: vllm/vllm-openai:latest
    restart: no
    ipc: host
    profiles: ["extraction"]
    depends_on:
      qwen:
        condition: service_healthy
    ports:
      - "8102:8000"
    volumes:
      - hf-cache:/root/.cache/huggingface
      - vllm-cache:/root/.cache/vllm
    secrets:
      - hf_token
    entrypoint: ["/bin/sh", "-c", "export HF_TOKEN=$(cat /run/secrets/hf_token) && exec python3 -m vllm.entrypoints.openai.api_server \"$@\"", "--"]
    command:
      - --model=BAAI/bge-m3
      - --gpu-memory-utilization=0.05
      - --trust-remote-code
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Qwen 3.5 9B — Large language model on port 8107.
  # Lightweight model suitable for RTX 5090 32GB VRAM.
  qwen:
    image: vllm/vllm-openai:latest
    restart: no
    ipc: host
    profiles: ["coding", "extraction"]
    ports:
      - "8107:8000"
    volumes:
      - hf-cache:/root/.cache/huggingface
      - vllm-cache:/root/.cache/vllm
    secrets:
      - hf_token
    entrypoint: ["/bin/sh", "-c", "export HF_TOKEN=$(cat /run/secrets/hf_token) && exec python3 -m vllm.entrypoints.openai.api_server \"$@\"", "--"]
    command:
      - --model=Qwen/Qwen3.5-9B
      - --max-model-len=60000
      - --gpu-memory-utilization=0.85
      - --reasoning-parser=qwen3
      - --enable-prefix-caching
      - --trust-remote-code
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  hf-cache:   # shared across all model containers
  vllm-cache: # torch.compile and FlashInfer JIT cache — persisted across restarts

secrets:
  hf_token:
    file: ./secrets/hf_token.txt
