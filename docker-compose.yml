# OpenAI-compatible model endpoints on the GPU workstation.
#
# Serves vLLM model containers (vision, text, embeddings) on fixed ports.
# Any client that speaks the OpenAI API can use these endpoints.
#
# Start:   docker compose up -d
# Stop:    docker compose down
#
# HuggingFace token (required for gated models like Llama):
#   echo -n "hf_..." > secrets/hf_token.txt
#   setfacl -m u:100000:r secrets/hf_token.txt
#
# Endpoints (OpenAI-compatible):
#   http://<this-host>:8100/v1  — OCR vision model       (Nanonets-OCR2-3B)
#   http://<this-host>:8102/v1  — embeddings             (BAAI/bge-m3)
#   http://<this-host>:8103/v1  — structured extraction  (NuExtract-2.0-4B)

services:

  # OCR vision model — Nanonets-OCR2-3B (Qwen2-VL based) on port 8100.
  nanonets-ocr2-3b:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    ipc: host
    ports:
      - "8100:8000"
    volumes:
      - hf-cache:/root/.cache/huggingface
      - vllm-cache:/root/.cache/vllm
    secrets:
      - hf_token
    entrypoint: ["/bin/sh", "-c", "export HF_TOKEN=$(cat /run/secrets/hf_token) && exec python3 -m vllm.entrypoints.openai.api_server \"$@\"", "--"]
    command:
      - --model=nanonets/Nanonets-OCR2-3B
      - --max-model-len=16128
      - --trust-remote-code
      - --gpu-memory-utilization=0.38
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Structured extraction — NuExtract-2.0-4B on port 8103.
  nuextract-2-0-4b:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    ipc: host
    depends_on:
      nanonets-ocr2-3b:
        condition: service_healthy
    ports:
      - "8103:8000"
    volumes:
      - hf-cache:/root/.cache/huggingface
      - vllm-cache:/root/.cache/vllm
    secrets:
      - hf_token
    entrypoint: ["/bin/sh", "-c", "export HF_TOKEN=$(cat /run/secrets/hf_token) && exec python3 -m vllm.entrypoints.openai.api_server \"$@\"", "--"]
    command:
      - --model=numind/NuExtract-2.0-4B
      - --max-model-len=8192
      - --override-generation-config={"temperature":0}
      - --gpu-memory-utilization=0.38
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Embeddings — BAAI/bge-m3 on port 8102, multilingual.
  bge-m3:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    ipc: host
    depends_on:
      nuextract-2-0-4b:
        condition: service_healthy
    ports:
      - "8102:8000"
    volumes:
      - hf-cache:/root/.cache/huggingface
    secrets:
      - hf_token
    entrypoint: ["/bin/sh", "-c", "export HF_TOKEN=$(cat /run/secrets/hf_token) && exec python3 -m vllm.entrypoints.openai.api_server \"$@\"", "--"]
    command:
      - --model=BAAI/bge-m3
      - --runner=pooling
      - --max-model-len=8192
      - --gpu-memory-utilization=0.05
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  hf-cache:   # shared across all model containers
  vllm-cache: # torch.compile and FlashInfer JIT cache — persisted across restarts

secrets:
  hf_token:
    file: ./secrets/hf_token.txt
